<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Game</title>
    
    <style>
        h1{
            font-family: 'Arial', sans-serif; /* Задаём шрифт Arial с fallback sans-serif */
            font-weight: normal;
        }

    </style>
</head>
<body>
    <h1>Player 1:</h1>
    <h1 style="background-color: Silver; padding: 5px; display: inline-block;">2♣</h1>
    <h1 style="background-color: Silver; color: red; padding: 5px; display: inline-block;">9♥</h1>
    <h1 style="background-color: Silver; color: red; padding: 5px; display: inline-block;">6♥</h1>
    <h1 style="background-color: Silver; color: red; padding: 5px; display: inline-block;">A♦</h1>
    <h1 style="background-color: Silver; padding: 5px; display: inline-block;">Q♠</h1>
    <h1 style="background-color: Silver; padding: 5px; display: inline-block;">J♣</h1>

    <h1>Player 2:</h1>
    <h1 style="background-color: Silver; color: red; padding: 5px; display: inline-block;">3♥</h1>
    <h1 style="background-color: Silver; padding: 5px; display: inline-block;">A♣</h1>
    <h1 style="background-color: Silver; padding: 5px; display: inline-block;">10♣</h1>
    <h1 style="background-color: Silver; color: red; padding: 5px; display: inline-block;">K♦</h1>
    <h1 style="background-color: Silver; padding: 5px; display: inline-block;">8♠</h1>
    <h1 style="background-color: Silver; color: red; padding: 5px; display: inline-block;">3♥</h1>
      

</body>
</html>
