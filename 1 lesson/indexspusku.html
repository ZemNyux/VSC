<!-- СПИСКИ ol li ul-->
<!-- ol - нумерація, нумерований список
     ul - крапочки -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ol>
        <li>Lorem, ipsum.</li>
        <li>Lorem, ipsum.</li>
        <li>Lorem, ipsum.</li>
        <li>Lorem, ipsum.</li>
    </ol>
    <li>Lorem, ipsum.</li>
    <ul>
        <li>Lorem, ipsum.</li>
        <li>Lorem, ipsum.</li>
        <li>Lorem, ipsum.</li>
        <li>Lorem, ipsum.</li>
    </ul>
    <p>Are you want to drink some coffee?</p>
    <select name="options" id="options"> <!--передає список вибору--> <!--id - унікальна ідентифікація -->
        <option value="Yes">Yes</option> <!--value - значення-->
        <option value="No">No</option>
        <option value="Maybe">Maybe</option>
    </select>
    <button for="options" action="https://web.in.ua">Press me!</button><!--тобто id кнопка наша шукає його на сайті-->
</body>
</html>
