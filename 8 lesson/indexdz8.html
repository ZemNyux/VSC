<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style1.css">
    <title>To Do List</title>
</head>

<body>
    <div class="container">
        <h1>My To Do List</h1>
        <div class="task">
            <input type="checkbox" class="checkbox">
            <span>Hit the gym</span>
            <span class="icon green">✖</span>
        </div>
        <div class="task">
            <input type="checkbox" class="checkbox">
            <span class="line">Pay bills</span>
            <span class="icon green">✖</span>
        </div>
        <div class="task">
            <input type="checkbox" class="checkbox">
            <span>Meet John</span>
            <span class="icon green">✖</span>
        </div>
        <div class="task">
            <input type="checkbox" class="checkbox">
            <span>Buy eggs</span>
            <span class="icon green">✖</span>
        </div>
        <div class="task">
            <input type="checkbox" class="checkbox">
            <span class="line">Read a book</span>
            <span class="icon green">✖</span>
        </div>
        <div class="task">
            <input type="checkbox" class="checkbox">
            <span>Organize office</span>
            <span class="icon green">✖</span>
        </div>
        <div class="task">
            <input type="checkbox" class="checkbox">
            <span>Eat dinner</span>
            <span class="icon green">✖</span>
        </div>
        <div class="task">
            <input type="checkbox" class="checkbox">
            <span>Buy apples</span>
            <span class="icon green">✖</span>
        </div>
        <div class="task">
            <input type="checkbox" class="checkbox">
            <span>Meet George</span>
            <span class="icon green">✖</span>
        </div>
        <div class="task">
            <input type="checkbox" class="checkbox">
            <span>Feed the cat</span>
            <span class="icon green">✖</span>
        </div>
        <div class="task">
            <input type="checkbox" class="checkbox">
            <span class="line">Write a letter</span>
            <span class="icon green">✖</span>
        </div>
        <div class="task">
            <input type="checkbox" class="checkbox">
            <span>Run 1 km</span>
            <span class="icon green">✖</span>
        </div>
    </div>


</body>

</html>
