<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit List</title>
    <style>
        body {
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0px;
        }

        .container {
            background-color: #f5f5f5;
            padding: 30px;
            width: 520px;
        }

        .fruit-list {
            background-color: #ed9eae;
            padding: 10px;
            width: 500px;
        }

        .fruit-item {
            background-color: #c66376;
            padding: 10px;
            margin: 10px;
            color: white;
        }

        .fruit-item span {
            background-color: #9e354a;
            padding-left: 20px;
            padding-right: 20px;
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .fruit-list span1 {
            background-color: #c66376;



        }
    </style>
</head>

<body>
    <div class="container">
        <div class="fruit-list">
            <div class="fruit-item">1. <span>Apple</span></div>
            <div class="fruit-item">2. <span>Orange</span></div>
            <div class="fruit-item">3. <span>Pineapple</span></div>
            <div class="fruit-item">4. <span>Pear</span></div>
            <div class="fruit-item">5. <span>Cherry</span></div>
        </div>
    </div>
</body>

</html>
