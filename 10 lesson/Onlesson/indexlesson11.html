<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style1.css">
    <title>Flexbox</title>
</head>

<body>
    <!-- Вправа 1: Центрування блоку -->
    <div class="container">
        <div class="box"></div>
    </div>

    <!-- Вправа 2: Рівномірний розподіл елементів -->
    <div class="container container-horizontal">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

    <!-- Вправа 3: Колонки з різною висотою -->
    <div class="container container-bottom">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>

</html>
