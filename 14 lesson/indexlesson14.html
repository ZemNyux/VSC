<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Інтернет-магазин</title>
    
</head>
<body>

    <!-- Навігація -->
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Магазин</h1>
            <ul class="nav-links">
                <li><a href="#">Головна</a></li>
                <li><a href="#">Каталог</a></li>
                <li><a href="#">Про нас</a></li>
                <li><a href="#">Контакти</a></li>
            </ul>
        </div>
    </nav>

    <!-- CSS-карусель -->
    <section class="slider">
        <div class="slider-container">
            <input type="radio" name="slider" id="slide1" checked>
            <input type="radio" name="slider" id="slide2">
            <input type="radio" name="slider" id="slide3">
            
            <div class="slides">
                <div class="slide">
                    <img src="https://via.placeholder.com/1200x400/ff5733/ffffff?text=Слайд+1" alt="Слайд 1">
                </div>
                <div class="slide">
                    <img src="https://via.placeholder.com/1200x400/33ff57/ffffff?text=Слайд+2" alt="Слайд 2">
                </div>
                <div class="slide">
                    <img src="https://via.placeholder.com/1200x400/3357ff/ffffff?text=Слайд+3" alt="Слайд 3">
                </div>
            </div>

            <!-- Навігаційні кнопки -->
            <div class="navigation">
                <label for="slide1"></label>
                <label for="slide2"></label>
                <label for="slide3"></label>
            </div>
        </div>
    </section>

    <!-- Футер -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Інтернет-магазин. Усі права захищено.</p>
        </div>
    </footer>

</body>
</html>
