<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDIO</title>
</head>

<body>

    <style>
        body {
            margin: 0;
        }

        audio::-webkit-media-controls-play-button {
            background-color: red;
            border-radius: 50%;
        }

        div {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: aqua;
            position: absolute;
            top: 200px;
            right: 1000px;
        }

        video {
            width: 1800px;
            height: 50%;
            position: absolute;
            z-index: -1000;
            filter: grayscale(50);
        }

        .videoConteiner {
            width: 1800px;
            position: absolute;
            z-index: 1000;
            left: 1800px;
        }
    </style>
    <audio src="./Umar Keyn – This Love Drives Me Crazy.mp3" preload="none" controls autoplay loop muted></audio>
    <div>PLAY</div>
    <div class="videoConteiner">
        <video src="./Unicorn School Challenge.mp4" autoplay muted></video>
    </div>
</body>

</html>
